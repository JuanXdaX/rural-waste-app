{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Editar Registro Ambiental #{{ reporte.id }}</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Tipo de Residuo</label>
                        <select class="form-select" name="tipo_quimico" required>
                            <option value="Pesticidas Organoclorados" {% if reporte.tipo_quimico == 'Pesticidas Organoclorados' %}selected{% endif %}>Pesticidas Organoclorados</option>
                            <option value="Fertilizantes Nitrogenados" {% if reporte.tipo_quimico == 'Fertilizantes Nitrogenados' %}selected{% endif %}>Fertilizantes Nitrogenados</option>
                            <option value="Aceites de Maquinaria" {% if reporte.tipo_quimico == 'Aceites de Maquinaria' %}selected{% endif %}>Aceites de Maquinaria</option>
                            <option value="Envases Plásticos" {% if reporte.tipo_quimico == 'Envases Plásticos' %}selected{% endif %}>Envases Plásticos</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Cantidad (Kg)</label>
                        <input type="number" step="0.01" class="form-control" name="cantidad" value="{{ reporte.cantidad }}" required>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-success">Actualizar Datos</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
